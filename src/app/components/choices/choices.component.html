<div class="choices-wrapper">
  <ion-select
    [value]="selected"
    [multiple]="multiple"
    [disabled]="options.length === 0"
    (ionChange)="onSelectChange($event.detail.value)"
    okText="OK"
    cancelText="Abbrechen"
    [placeholder]="options.length === 0 ? 'Typen hinzufügen' : 'Auswahl'"
    class="custom-select"
  >
    @for (option of options; track $index) {
      <ion-select-option [value]="option">
        {{ option }}
      </ion-select-option>
    }
  </ion-select>

  <ion-button
    fill="clear"
    color="secondary"
    (click)="openAddItemModal()"
    class="add-btn"
  >
    <ion-icon
      name="add-circle-outline"
      slot="icon-only"
    ></ion-icon>
  </ion-button>
</div>

<ion-modal
  [isOpen]="showAddModal"
  [initialBreakpoint]="0.5"
  [breakpoints]="[0, 0.5]"
  (didDismiss)="closeAddModal()"
>
  <ng-template>
    <ion-header>
      <ion-toolbar>
        <ion-title>Neuen Eintrag hinzufügen</ion-title>
        <ion-buttons slot="end">
          <ion-button (click)="closeAddModal()">Abbrechen</ion-button>
        </ion-buttons>
      </ion-toolbar>
    </ion-header>
    <ion-content>
      <ion-item>
        <ion-input
          placeholder="Neuen Wert eingeben"
          [(ngModel)]="newOption"
        ></ion-input>
      </ion-item>
      <ion-button
        expand="block"
        (click)="addNewOption()"
      >
        Hinzufügen
      </ion-button>
    </ion-content>
  </ng-template>
</ion-modal>
