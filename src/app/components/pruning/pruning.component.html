<ion-item
  class="ion-no-padding bg-transparent"
  lines="none"
>
  <ion-label>Rückschnitt</ion-label>

  <ion-checkbox
    slot="end"
    [checked]="(plantForm$ | async)?.pruning?.enabled"
    (ionChange)="plantFormService.update('pruning.enabled', $event.detail.checked)"
  />
</ion-item>
@if ((plantForm$ | async)?.pruning?.enabled) {
  <app-range-slider
    class="ion-padding-start"
    label="Wann"
    [range]="monthRange"
    [value]="(plantForm$ | async)?.pruning!.time"
    (valueChange)="plantFormService.update('pruning.time', $event)"
  />
  <ion-input
    class="ion-padding-start"
    label="Wie viel"
    placeholder="z.B. 1/3"
    [value]="(plantForm$ | async)?.pruning?.amount"
    (ionChange)="plantFormService.update('pruning.amount', $event.detail.value ?? '')"
  />
}
