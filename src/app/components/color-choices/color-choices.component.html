<ion-text>
  {{ title }}
</ion-text>

@let plant = plantFormService.plantForm$ | async;
@if (plant) {
  <div class="color-grid">
    @for (color of colors; track $index) {
      <div
        class="color-swatch"
        [class.selected]="isSelected(getColors(plant), color)"
        [style.background]="color"
        [style.--swatch-color]="color"
        (click)="toggleColor(color, getColors(plant))"
      ></div>
    }
  </div>
}
