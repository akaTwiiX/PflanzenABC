<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home"></ion-back-button>
    </ion-buttons>
    <ion-title>Pflanze {{isEditMode ? 'bearbeiten' : 'hinzufügen'}}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="safe-area">
    <app-image-picker
      [value]="(plantForm$ | async)?.imageUrl"
      (valueChange)="plantFormService.update('imageUrl', $event)"
    />
    <ion-list>
      <ion-item lines="none">
        <ion-input
          label="Botanischer Name"
          labelPlacement="floating"
          placeholder="Enter text"
          [value]="(plantForm$ | async)?.nameLatin"
          (ionChange)="plantFormService.update('nameLatin', $event.detail.value ?? '')"
        />
      </ion-item>
      <ion-item lines="none">
        <ion-input
          label="Deutscher Name"
          labelPlacement="floating"
          placeholder="Enter text"
          [value]="(plantForm$ | async)?.nameGerman"
          (ionChange)="plantFormService.update('nameGerman', $event.detail.value ?? '')"
        />
      </ion-item>
      <ion-item lines="none">
        <app-plant-type />
      </ion-item>
      <ion-item lines="none">
        <app-range-slider
          label="Höhe:"
          [range]="distanceRange"
          [value]="(plantForm$ | async)?.height!"
          (valueChange)="plantFormService.update('height', $event)"
        />
      </ion-item>
      <ion-item lines="none">
        <app-range-slider
          label="Breite:"
          [range]="distanceRange"
          [value]="(plantForm$ | async)?.width!"
          (valueChange)="plantFormService.update('width', $event)"
        />
      </ion-item>

      <ion-item lines="none">
        <ion-input
          label="Wachstum:"
          labelPlacement="floating"
          placeholder="Enter text"
          [value]="(plantForm$ | async)?.growth"
          (ionChange)="plantFormService.update('growth', $event.detail.value ?? '')"
        />
      </ion-item>

      <ion-item lines="none">
        <app-growth-form />
      </ion-item>

      <ion-item lines="none">
        <app-range-slider
          label="Blüte-/Erntezeit:"
          [range]="monthRange"
          [value]="(plantForm$ | async)?.bloomTime!"
          (valueChange)="plantFormService.update('bloomTime', $event)"
        />
      </ion-item>

      <ion-item lines="none">
        <app-color-choices
          [title]="'Blütefarbe:'"
          [choiceName]="'bloomColor'"
        />
      </ion-item>

      <ion-item lines="none">
        <app-leaf-shape />
      </ion-item>

      <ion-item lines="none">
        <app-color-choices
          [title]="'Blätterfarbe:'"
          [choiceName]="'leafColor'"
        />
      </ion-item>
      <ion-item lines="none">
        <app-autumn-colors />
      </ion-item>
      <ion-item lines="none">
        <app-soil />
      </ion-item>
      <ion-item lines="none">
        <app-fertilization />
      </ion-item>
      <ion-item lines="none">
        <app-distance />
      </ion-item>
      <ion-item lines="none">
        <app-required-area />
      </ion-item>
      <ion-item lines="none">
        <app-root-system />
      </ion-item>

      <ion-item lines="none">
        <app-pruning />
      </ion-item>

      <ion-item lines="none">
        <app-water-selector />
      </ion-item>

      <ion-item lines="none">
        <app-light-selector />
      </ion-item>

      <ion-item lines="none">
        <app-fruit />
      </ion-item>

      @for( field of checkboxFields; track field){
      <ion-item lines="none">
        <ion-label>{{ checkboxLabels[field] }}</ion-label>
        <ion-checkbox
          slot="end"
          [checked]="(plantForm$ | async)?.[field]"
          (ionChange)="plantFormService.update(field, $event.detail.checked)"
        ></ion-checkbox>
      </ion-item>
      }

      <ion-item lines="none">
        <ion-textarea
          class="text-area"
          label="Notizen/Pflege/Schritt"
          labelPlacement="floating"
          fill="outline"
          placeholder="Enter text"
          [value]="(plantForm$ | async)?.notice"
          (ionChange)="plantFormService.update('notice', $event.detail.value ?? '')"
          autoGrow="true"
        />
      </ion-item>
    </ion-list>
    <ion-button
      expand="block"
      shape="round"
      (click)="savePlant()"
    >
      Speichern
    </ion-button>
  </div>
</ion-content>

<ion-modal
  id="dialog"
  #dialog
>
  <ng-template>
    <div class="wrapper">
      <h1>Was möchtest du machen?</h1>
      <div class="button-row">
        <ion-button
          class="ion-margin-bottom"
          expand="block"
          color="primary"
          (click)="saveAndAddAnother()"
        >
          Speichern und neue Pflanze hinzufügen
        </ion-button>
        <ion-button
          expand="block"
          color="primary"
          (click)="saveAndView()"
        >
          Speichern
        </ion-button>
      </div>
    </div>
  </ng-template>
</ion-modal>
